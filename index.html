<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>风险评估列线图</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .form-group { margin-bottom: 15px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    .result { margin-top: 20px; font-weight: bold; color: red; }
  </style>
</head>
<body>

<h2>请输入您的信息进行风险评估</h2>

<form id="riskForm">
  <div class="form-group">
    <label>年龄：</label>
    <input type="number" id="age" min="18" max="100" required />
  </div>

  <div class="form-group">
    <label>收缩压 (mmHg)：</label>
    <input type="number" id="sbp" min="90" max="250" required />
  </div>

  <div class="form-group">
    <label>空腹血糖 (mmol/L)：</label>
    <input type="number" id="glucose" min="3.9" max="20" required />
  </div>

  <button type="button" onclick="calculateRisk()">计算风险</button>
</form>

<div id="result" class="result"></div>

<script>
function calculateRisk() {
  const age = parseFloat(document.getElementById("age").value);
  const sbp = parseFloat(document.getElementById("sbp").value);
  const glucose = parseFloat(document.getElementById("glucose").value);

  // 假设的评分公式（实际需根据医学模型调整）
  let score = 0;
  score += (age - 40) * 0.5;           // 年龄权重
  score += (sbp - 120) * 0.3;          // 收缩压权重
  score += (glucose - 5.6) * 0.8;      // 血糖权重

  // 风险等级判断
  let level, message;
  if (score < 10) {
    level = "低风险";
    message = "您的风险较低，继续保持健康生活方式。";
  } else if (score < 20) {
    level = "中风险";
    message = "您的风险处于中等水平，请注意定期体检。";
  } else {
    level = "高风险";
    message = "您的综合评分为高风险，请尽快就医评估。";
  }

  document.getElementById("result").innerHTML = 
    `<strong>风险等级：${level}</strong><br>${message}`;
}
</script>

</body>
</html>
